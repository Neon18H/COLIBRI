<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Viaje del Colibrí</title>

  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <div class="hummingbird hummingbird-1" aria-hidden="true"><i class="bi bi-feather"></i></div>
  <div class="hummingbird hummingbird-2" aria-hidden="true"><i class="bi bi-feather-fill"></i></div>

  <main class="app-shell container py-4 py-md-5">
    <!-- Controles globales -->
    <div class="d-flex justify-content-end mb-3">
      <button id="music-toggle" class="btn btn-glow" type="button" aria-label="Reproducir o pausar música">
        <i class="bi bi-play-circle"></i> Música
      </button>
    </div>

    <!-- INTRO -->
    <section id="screen-intro" class="screen active-screen fade-in-up">
      <div class="glass-card mx-auto text-center p-4 p-md-5">
        <p class="kicker mb-2">Carta interactiva</p>
        <h1 class="display-title mb-3">Colibrí</h1>
        <p id="intro-typing" class="lead-text mb-4"></p>
        <button id="start-journey" class="btn btn-glow btn-lg px-4" type="button">Comenzar el viaje</button>
      </div>
    </section>

    <!-- JUEGO -->
    <section id="screen-game" class="screen d-none">
      <div class="glass-card mx-auto p-4 p-md-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
          <h2 id="phase-title" class="section-title mb-0">Fase 1 — Los 5 acertijos del colibrí</h2>
          <span id="riddle-counter" class="badge text-bg-light riddle-badge">Acertijo 1/10</span>
        </div>

        <div class="progress progress-custom mb-4" role="progressbar" aria-label="Progreso" aria-valuemin="0" aria-valuemax="100">
          <div id="progress-bar" class="progress-bar"></div>
        </div>

        <article id="riddle-card" class="riddle-card">
          <p id="riddle-text" class="riddle-text"></p>
          <div class="input-group mt-3">
            <span class="input-group-text"><i class="bi bi-chat-heart"></i></span>
            <input id="riddle-answer" type="text" class="form-control" placeholder="Escribe tu respuesta..." autocomplete="off" />
          </div>
          <div class="d-flex flex-wrap gap-2 mt-3">
            <button id="submit-answer" class="btn btn-glow" type="button">
              <i class="bi bi-check2-circle"></i> Confirmar
            </button>
            <button id="reset-progress" class="btn btn-outline-light" type="button">
              <i class="bi bi-arrow-counterclockwise"></i> Reiniciar progreso
            </button>
          </div>
          <p id="feedback" class="feedback mt-3 mb-0"></p>
        </article>
      </div>
    </section>

    <!-- REVELACIÓN FASE 1 -->
    <section id="screen-phase1-reveal" class="screen d-none text-center">
      <div class="glass-card mx-auto p-4 p-md-5">
        <h2 class="section-title mb-3">Revelación</h2>
        <p class="lead-text fade-in">Si lograste llegar hasta aquí,<br />es porque aún existe un hilo invisible entre nosotros…</p>

        <!-- EDITABLE: cambia dirección y hora aquí -->
        <div class="secret-card mt-4 mb-4 p-4">
          <p class="mb-1"><i class="bi bi-geo-alt"></i> Avenida <span id="secret-avenue">_________</span></p>
          <p class="mb-0"><i class="bi bi-clock"></i> A las <span id="secret-hour">______</span> PM</p>
        </div>

        <button id="continue-phase2" class="btn btn-glow" type="button">Continuar</button>
      </div>
    </section>

    <!-- FINAL -->
    <section id="screen-final" class="screen d-none text-center">
      <div class="glass-card mx-auto p-4 p-md-5">
        <h2 id="final-phrase" class="display-title mb-3"></h2>
        <p id="final-thanks" class="lead-text mb-4"></p>
        <button id="restart-story" class="btn btn-glow" type="button">Reiniciar historia</button>
      </div>
    </section>
  </main>

  <!-- Audio sutil (editable) -->
  <audio id="ambient-music" loop preload="none">
    <!-- Reemplaza por tu pista romántica -->
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f19325a1.mp3?filename=piano-moment-9835.mp3" type="audio/mpeg" />
  </audio>
  <audio id="success-sound" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_84f22f0998.mp3?filename=correct-2-46134.mp3" type="audio/mpeg" />
  </audio>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
